<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malaysia Map - X / Y Coordinates Guide</title>
    <link rel="icon" href="https://www.html5interactivemaps.com/assets/images/favicon.ico">
</head>
</head>
<body>
  <style type="text/css">
  body{margin:0;color:#333;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f5f5f5;padding:10px}.container{width:750px;background-color:#FFF;margin:0 auto;margin-top:10px;padding:10px;border-radius:8px;box-shadow:0 0 20px rgb(0 0 0 / .1)}.container p{text-align:center;margin:15px 0 10px 0; width: 100%;color:#5e5e5e}h1{font-size:28px;color:#333;text-align:center;margin-top:10px;margin-bottom:20px}.values{text-align:center}.values>label,.values>textarea,.values>button,.values>p{display:inline-block;vertical-align:top}.mr-15{margin-right:15px}label{font-size:1.2em}select{padding:6px;font-size:1em;border:1px solid #ccc;border-radius:5px;background-color:#fff}textarea{width:80px;padding:6px;font-size:1.2em;text-align:center;border:1px solid #ccc;border-radius:5px;resize:none;box-shadow:0 2px 4px rgb(0 0 0 / .1)}button{padding:7px 15px;font-size:1em;color:#fff;background-color:#007BFF;border:none;border-radius:5px;cursor:pointer;transition:background-color 0.3s ease}button:hover{background-color:#0056b3}.image-container{text-align:center}svg{border:1px solid #a1a1a1}svg,svg image{width:750px;height:300px}.copyright{width:100%;margin-bottom:10px;display:block;text-align:center}
  </style>
  <div class="container">
    <h1>Malaysia Map - X / Y Coordinates Guide</h1>
    <div class="values">
      <label>pos_X:</label>
      <textarea id="textarea1" rows="1" placeholder=""></textarea>
      <button class="mr-15" onclick="copyToClipboard('textarea1')">Copy</button>

      <label>pos_Y:</label>
      <textarea id="textarea2" rows="1" placeholder=""></textarea>
      <button class="mr-15" onclick="copyToClipboard('textarea2')">Copy</button>

      <select id="dropdownMenu" onchange="insertTexts(this.value);">
        <option value="">-- Major Cities --</option>
        <option value="option1">IPOH</option>
        <option value="option2">SHAH ALAM</option>
        <option value="option3">ISKANDAR PUTERI</option>
        <option value="option4">KOTA KINABALU</option>
      </select>
    </div>

    <p>Click anywhere on the map to get the X and Y Coordinates:</p>
    <div class="image-container">
      <svg id="svgContainer" onclick="captureClickCoordinates(event)"></svg>
    </div>
    <p class="copyright">COPYRIGHT © All rights reserved to <a href="https://www.html5interactivemaps.com/">html5interactivemaps.com</a></p>
  </div>


<script>
  function insertTexts(option) {
    const textarea1 = document.getElementById("textarea1");
    const textarea2 = document.getElementById("textarea2");

    switch (option) {
      case "option1":
        textarea1.value = "137";
        textarea2.value = "122";
        break;
      case "option2":
        textarea1.value = "150";
        textarea2.value = "190";
        break;
      case "option3":
        textarea1.value = "246";
        textarea2.value = "268";
        break;
      case "option4":
        textarea1.value = "604";
        textarea2.value = "73";
        break;
    }
  }

  function copyToClipboard(id) {
    const textarea = document.getElementById(id);
    textarea.select();
    textarea.setSelectionRange(0, 99999); // For mobile devices
    navigator.clipboard.writeText(textarea.value);
  }

  function captureClickCoordinates(event) {
    const svg = document.getElementById("svgContainer");
    const rect = svg.getBoundingClientRect();
    
    const x = Math.round(event.clientX - rect.left);
    const y = Math.round(event.clientY - rect.top);

    const textarea1 = document.getElementById("textarea1");
    const textarea2 = document.getElementById("textarea2");
    textarea1.value = x;
    textarea2.value = y;

    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    circle.setAttribute("cx", x);
    circle.setAttribute("cy", y);
    circle.setAttribute("r", 3);
    circle.setAttribute("fill", "red");

    svg.innerHTML = '';
    const image = document.createElementNS("http://www.w3.org/2000/svg", "image");
    image.setAttribute("href", "xyimage.png");
    image.setAttribute("width", "750");
    image.setAttribute("height", "300");
    svg.appendChild(image);
    svg.appendChild(circle);
  }

  window.onload = function() {
    const svg = document.getElementById("svgContainer");
    const image = document.createElementNS("http://www.w3.org/2000/svg", "image");
    image.setAttribute("href", "xyimage.png");
    image.setAttribute("width", "750");
    image.setAttribute("height", "300");
    svg.appendChild(image);
  };
</script>

</body>
</html>
